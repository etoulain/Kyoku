<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kyokushin">
<meta name="theme-color" content="#0a0a0c">
<meta name="description" content="Belt-by-belt Kyokushin Karate study guide">
<link rel="manifest" href="manifest.json">
<script src="figures.js"></script>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Kyokushin — Path of the Belt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0c; --red: #c0392b; --gold: #c9a84c; --gold-light: #e8c96a;
    --mist: #4a4a55; --white: #faf8f4;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { scroll-behavior:smooth; }
  body {
    background:var(--ink); color:var(--white);
    font-family:'Crimson Pro',Georgia,serif;
    min-height:100vh; min-height:100dvh;
    overflow-x:hidden; overscroll-behavior:none;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:9999; opacity:0.35;
  }

  /* ── HEADER ── */
  header {
    padding:calc(var(--safe-top) + 40px) 20px 28px;
    text-align:center;
    border-bottom:1px solid rgba(201,168,76,0.2);
    background:radial-gradient(ellipse at 50% -10%, rgba(192,57,43,0.18) 0%, transparent 60%);
    position:relative; overflow:hidden;
  }
  header::after {
    content:'極真'; position:absolute; font-family:'Cinzel Decorative',serif;
    font-size:clamp(100px,35vw,180px); color:rgba(201,168,76,0.035);
    top:50%; left:50%; transform:translate(-50%,-38%);
    pointer-events:none; letter-spacing:-6px; white-space:nowrap;
  }
  .header-top {
    display:flex; align-items:center; justify-content:center;
    gap:12px; margin-bottom:14px; flex-wrap:wrap;
  }
  .header-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.25);
    border-radius:2px; padding:5px 12px;
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px;
    color:var(--gold); text-transform:uppercase;
  }
  h1 {
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(22px,7vw,44px); font-weight:900;
    letter-spacing:1px; line-height:1.1;
    background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 50%,#a07830 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:8px;
  }
  .subtitle { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--mist); text-transform:uppercase; }

  /* ── LANGUAGE SWITCHER ── */
  .lang-switcher {
    display:inline-flex; align-items:center;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:3px; overflow:hidden;
  }
  .lang-btn {
    padding:5px 10px; border:none; background:transparent;
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px;
    color:var(--mist); cursor:pointer; text-transform:uppercase;
    transition:all 0.2s; position:relative;
  }
  .lang-btn.active {
    background:rgba(201,168,76,0.15); color:var(--gold-light);
  }
  .lang-btn:not(:last-child) { border-right:1px solid rgba(255,255,255,0.08); }

  /* ── INSTALL BANNER ── */
  #installBanner {
    display:none; align-items:center; justify-content:space-between;
    background:rgba(201,168,76,0.1); border-bottom:1px solid rgba(201,168,76,0.2);
    padding:10px 16px; gap:12px;
  }
  #installBanner p { font-size:13px; color:rgba(255,255,255,0.8); flex:1; }
  #installBanner p strong { color:var(--gold-light); font-family:'Cinzel',serif; font-size:11px; }
  .install-btn {
    background:var(--gold); color:var(--ink); border:none; border-radius:3px;
    padding:8px 14px; font-family:'Cinzel',serif; font-size:10px;
    letter-spacing:1px; cursor:pointer; white-space:nowrap; font-weight:600;
  }
  .dismiss-btn { background:transparent; border:none; color:var(--mist); font-size:18px; cursor:pointer; padding:0 4px; line-height:1; }

  /* ── PROGRESS PATH ── */
  .progress-path {
    display:flex; align-items:center; justify-content:center;
    gap:0; padding:16px 12px 8px; overflow-x:auto; scrollbar-width:none;
  }
  .progress-path::-webkit-scrollbar { display:none; }
  .progress-node { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; flex-shrink:0; padding:0 2px; }
  .progress-dot { width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,0.12); transition:all 0.3s; }
  .progress-node.current .progress-dot { box-shadow:0 0 0 3px rgba(255,255,255,0.08); transform:scale(1.35); }
  .progress-node.future .progress-dot { opacity:0.3; }
  .progress-label { font-family:'Cinzel',serif; font-size:7px; letter-spacing:1px; color:var(--mist); text-transform:uppercase; }
  .progress-line { width:24px; height:1px; background:rgba(255,255,255,0.08); flex-shrink:0; margin-bottom:20px; }

  /* ── BELT NAV ── */
  .belt-nav {
    display:flex; overflow-x:auto; scrollbar-width:none;
    border-bottom:1px solid rgba(255,255,255,0.06);
    position:sticky; top:0; z-index:100;
    background:rgba(10,10,12,0.97); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  }
  .belt-nav::-webkit-scrollbar { display:none; }
  .belt-tab {
    flex:none; display:flex; align-items:center; gap:7px;
    padding:14px 16px; cursor:pointer; border:none;
    background:transparent; color:var(--mist);
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
    text-transform:uppercase; transition:color 0.25s; position:relative;
    white-space:nowrap; border-right:1px solid rgba(255,255,255,0.04);
    touch-action:manipulation;
  }
  .belt-tab::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; transform:scaleX(0); transition:transform 0.3s; }
  .belt-tab.active { color:var(--white); }
  .belt-tab.active::after { transform:scaleX(1); }
  .belt-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; border:1.5px solid rgba(255,255,255,0.15); }
  .belt-tab[data-belt="white"] .belt-dot { background:#e8e4dc; }
  .belt-tab[data-belt="orange"] .belt-dot { background:#e07020; }
  .belt-tab[data-belt="blue"] .belt-dot { background:#1a5fa8; }
  .belt-tab[data-belt="yellow"] .belt-dot { background:#1a5fa8; }
  .belt-tab[data-belt="green"] .belt-dot { background:#2a7a3a; }
  .belt-tab[data-belt="brown"] .belt-dot { background:#6b3a1f; }
  .belt-tab[data-belt="black"] .belt-dot { background:#1a1a1a; border-color:var(--gold); }
  .belt-tab[data-belt="white"].active::after { background:#e8e4dc; }
  .belt-tab[data-belt="orange"].active::after { background:#e07020; }
  .belt-tab[data-belt="blue"].active::after { background:#1a5fa8; }
  .belt-tab[data-belt="yellow"].active::after { background:#1a5fa8; }
  .belt-tab[data-belt="green"].active::after { background:#2a7a3a; }
  .belt-tab[data-belt="brown"].active::after { background:#6b3a1f; }
  .belt-tab[data-belt="black"].active::after { background:var(--gold); }
  .you-badge { font-size:7px; background:var(--red); color:white; padding:1px 4px; border-radius:2px; letter-spacing:1px; }

  /* ── APP SHELL ── */
  .app-shell { display:flex; min-height:calc(100vh - 120px); }
  .sidebar { display:none; }
  main { flex:1; max-width:800px; margin:0 auto; padding:28px 20px calc(var(--safe-bottom) + 48px); width:100%; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

  /* ── BELT HERO ── */
  .belt-hero {
    display:flex; align-items:center; gap:20px;
    margin-bottom:32px; padding:24px;
    border:1px solid rgba(255,255,255,0.07); border-radius:8px;
    background:rgba(255,255,255,0.02); position:relative; overflow:hidden;
    animation:fadeUp 0.35s ease;
  }
  .belt-visual { width:64px; height:16px; border-radius:3px; flex-shrink:0; }
  .belt-hero-text .kyu { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--mist); text-transform:uppercase; margin-bottom:4px; }
  .belt-hero-text h2 { font-family:'Cinzel Decorative',serif; font-size:clamp(18px,3vw,28px); margin-bottom:8px; }
  .belt-hero-text p { font-size:clamp(14px,1.4vw,17px); color:rgba(255,255,255,0.55); line-height:1.65; font-style:italic; }

  /* ── SECTION HEADERS ── */
  .section-header { display:flex; align-items:center; gap:14px; margin:36px 0 18px; }
  .section-header h3 { font-family:'Cinzel',serif; font-size:clamp(9px,1vw,11px); letter-spacing:4px; text-transform:uppercase; color:var(--gold); white-space:nowrap; }
  .section-header::after { content:''; flex:1; height:1px; background:linear-gradient(to right,rgba(201,168,76,0.25),transparent); }

  /* ── EXAM BOX ── */
  .exam-box { background:rgba(201,168,76,0.04); border:1px solid rgba(201,168,76,0.18); border-radius:8px; padding:24px; margin-bottom:8px; }
  .exam-box h4 { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }
  .exam-list { list-style:none; display:grid; grid-template-columns:1fr; gap:9px; }
  .exam-list li { display:flex; align-items:flex-start; gap:10px; font-size:clamp(14px,1.3vw,16px); color:rgba(255,255,255,0.72); line-height:1.5; }
  .exam-list li::before { content:'◆'; color:var(--gold); font-size:7px; margin-top:6px; flex-shrink:0; }


  /* ── TECHNIQUE FIGURE ── */
  .tech-fig {
    width: 100%;
    height: 140px;
    display: block;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .technique-card-body { padding: 16px; }
  /* ── TECHNIQUE CARDS ── */
  .techniques-grid { display:grid; grid-template-columns:1fr; gap:14px; }
  .technique-card {
    background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07);
    border-radius:8px; overflow:hidden;
    transition:border-color 0.25s,transform 0.2s,box-shadow 0.2s; animation:fadeUp 0.35s ease;
  }
  .technique-card:hover { border-color:rgba(201,168,76,0.3); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .technique-card:active { background:rgba(255,255,255,0.04); }
  .technique-card-body { padding:20px; }
  .technique-japanese { font-family:'Cinzel',serif; font-size:clamp(20px,2.5vw,26px); font-weight:600; color:var(--gold-light); margin-bottom:2px; }
  .technique-romaji { font-size:clamp(10px,1vw,12px); letter-spacing:2px; color:var(--mist); margin-bottom:6px; font-family:'Cinzel',serif; font-style:italic; }
  .technique-english { font-size:clamp(15px,1.5vw,18px); font-weight:600; color:var(--white); margin-bottom:10px; }
  .technique-desc { font-size:clamp(13px,1.2vw,15px); color:rgba(255,255,255,0.5); line-height:1.7; }
  .technique-footer { display:flex; align-items:center; justify-content:space-between; margin-top:14px; flex-wrap:wrap; gap:8px; }
  .technique-tag { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; text-transform:uppercase; padding:3px 9px; border-radius:2px; }
  .tag-kihon { background:rgba(192,57,43,0.18); color:#e07060; border:1px solid rgba(192,57,43,0.28); }
  .tag-kata { background:rgba(26,95,168,0.18); color:#6090e0; border:1px solid rgba(26,95,168,0.28); }
  .tag-kumite { background:rgba(42,122,58,0.18); color:#60c070; border:1px solid rgba(42,122,58,0.28); }
  .tag-kihon-waza { background:rgba(150,80,20,0.18); color:#d09050; border:1px solid rgba(150,80,20,0.28); }
  .video-link {
    display:inline-flex; align-items:center; gap:6px;
    padding:7px 14px; background:rgba(192,57,43,0.12);
    border:1px solid rgba(192,57,43,0.25); border-radius:3px;
    color:#e07060; text-decoration:none;
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px;
    text-transform:uppercase; transition:background 0.2s,color 0.2s; touch-action:manipulation;
  }
  .video-link:hover { background:rgba(192,57,43,0.25); color:#ff9080; }

  /* ── KATA CARDS ── */
  .kata-card {
    display:flex; gap:20px; background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.06); border-radius:8px;
    padding:20px; margin-bottom:12px; transition:border-color 0.25s,background 0.25s;
  }
  .kata-card:hover { border-color:rgba(26,95,168,0.35); background:rgba(26,95,168,0.04); }
  .kata-number { font-family:'Cinzel Decorative',serif; font-size:clamp(20px,2.5vw,32px); color:rgba(255,255,255,0.07); flex-shrink:0; width:40px; line-height:1; }
  .kata-info h4 { font-family:'Cinzel',serif; font-size:clamp(14px,1.5vw,17px); color:var(--gold-light); margin-bottom:3px; }
  .kata-meaning { font-size:clamp(11px,1vw,13px); color:var(--mist); font-style:italic; margin-bottom:8px; font-family:'Cinzel',serif; }
  .kata-desc { font-size:clamp(13px,1.2vw,15px); color:rgba(255,255,255,0.55); line-height:1.65; }

  /* ── OFFLINE TOAST ── */
  #offlineToast {
    position:fixed; bottom:calc(var(--safe-bottom) + 16px); left:50%;
    transform:translateX(-50%) translateY(80px);
    background:#1a1a1a; border:1px solid rgba(201,168,76,0.3);
    color:var(--gold-light); padding:10px 20px; border-radius:4px;
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px;
    transition:transform 0.4s; z-index:10000; white-space:nowrap;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }
  #offlineToast.show { transform:translateX(-50%) translateY(0); }

  /* ── TABLET ≥ 700px ── */
  @media (min-width:700px) {
    .belt-nav { justify-content:center; }
    .belt-tab { padding:16px 22px; font-size:11px; }
    .belt-dot { width:12px; height:12px; }
    .exam-list { grid-template-columns:1fr 1fr; }
    .techniques-grid { grid-template-columns:1fr 1fr; }
    main { padding:36px 32px calc(var(--safe-bottom) + 48px); }
    .belt-hero { padding:28px 32px; }
    .belt-visual { width:80px; height:20px; }
    .progress-line { width:40px; }
    .progress-dot { width:18px; height:18px; }
    .progress-label { font-size:8px; }
  }

  /* ── DESKTOP ≥ 1024px ── */
  @media (min-width:1024px) {
    header { padding:calc(var(--safe-top) + 56px) 40px 40px; }
    h1 { font-size:clamp(36px,4vw,56px); }
    .subtitle { font-size:12px; letter-spacing:5px; }
    .header-badge { font-size:10px; }
    .progress-dot { width:20px; height:20px; }
    .progress-line { width:56px; }
    .progress-label { font-size:9px; }
    .belt-nav { justify-content:center; }
    .belt-tab { padding:18px 28px; font-size:11px; letter-spacing:3px; }
    .app-shell { max-width:1280px; margin:0 auto; }
    .sidebar {
      display:flex; flex-direction:column;
      width:260px; flex-shrink:0;
      padding:36px 0 36px 36px;
      position:sticky; top:52px;
      height:calc(100vh - 52px);
      overflow-y:auto; scrollbar-width:none;
      border-right:1px solid rgba(255,255,255,0.05);
    }
    .sidebar::-webkit-scrollbar { display:none; }
    .sidebar-label { font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; text-transform:uppercase; color:var(--mist); margin-bottom:20px; }
    .sidebar-belt {
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; border-radius:6px; cursor:pointer;
      border:1px solid transparent; transition:all 0.25s;
      margin-bottom:4px; text-align:left; background:transparent;
      color:rgba(255,255,255,0.45); font-family:'Cinzel',serif; font-size:12px; letter-spacing:1px;
    }
    .sidebar-belt:hover { background:rgba(255,255,255,0.04); color:var(--white); }
    .sidebar-belt.active { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.08); color:var(--white); }
    .sidebar-belt-swatch { width:28px; height:8px; border-radius:2px; flex-shrink:0; }
    .sidebar-belt-info { flex:1; }
    .sidebar-belt-name { font-size:12px; margin-bottom:1px; }
    .sidebar-belt-kyu { font-size:9px; color:var(--mist); letter-spacing:1px; }
    .sidebar-you { font-size:7px; background:var(--red); color:white; padding:1px 5px; border-radius:2px; }
    .sidebar-divider { height:1px; background:rgba(255,255,255,0.06); margin:16px 0; }
    main { flex:1; max-width:none; padding:36px 48px calc(var(--safe-bottom) + 60px); }
    .techniques-grid { grid-template-columns:repeat(3,1fr); }
    .exam-list { grid-template-columns:1fr 1fr; }
    .kata-card { padding:24px 28px; gap:24px; }
    .kata-number { font-size:36px; width:48px; }
    .belt-hero { padding:32px 36px; gap:28px; }
    .belt-visual { width:100px; height:24px; }
  }

  /* ── WIDE DESKTOP ≥ 1400px ── */
  @media (min-width:1400px) {
    .sidebar { width:300px; padding-left:48px; }
    main { padding:48px 64px calc(var(--safe-bottom) + 60px); }
    .techniques-grid { grid-template-columns:repeat(3,1fr); gap:18px; }
    .exam-list { grid-template-columns:1fr 1fr 1fr; }
  }
</style>
</head>
<body>

<div id="installBanner">
  <p><strong id="ib-title">Install App</strong> — <span id="ib-desc">Add to home screen for offline use</span></p>
  <button class="install-btn" id="installBtn">Install</button>
  <button class="dismiss-btn" id="dismissBtn">×</button>
</div>

<header>
  <div class="header-top">
    <div class="header-badge"><span>⛩</span><span>Kyokushinkai Karate</span></div>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
    </div>
  </div>
  <h1 id="mainTitle">Path of the Belt</h1>
  <p class="subtitle">極真会館 · <span id="subtitleText">Study Guide</span></p>
</header>

<div class="progress-path" id="progressPath"></div>
<nav class="belt-nav" id="beltNav"></nav>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-label" id="sidebarLabel">Belt Progression</div>
    <div id="sidebarBelts"></div>
    <div class="sidebar-divider"></div>
    <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--mist);line-height:1.8;">
      極真会館<br>Kyokushinkai<br>
      <span style="font-size:8px;opacity:0.5">Mas Oyama · 1964</span>
    </div>
  </aside>
  <main id="mainContent"></main>
</div>

<div id="offlineToast">✓ <span id="toastText">Available offline</span></div>

<script>
// ════════════════════════════════════════════════
// TRANSLATIONS
// ════════════════════════════════════════════════
const UI = {
  en: {
    title: 'Path of the Belt',
    subtitle: 'Study Guide',
    sidebarLabel: 'Belt Progression',
    examTitle: b => `To pass the ${b} examination:`,
    sectionExam: 'Exam Requirements',
    sectionTech: 'Techniques — Waza',
    sectionKata: 'Kata — 型',
    watchYoutube: '▶ Watch on YouTube',
    watchShort: '▶ YouTube',
    toastOffline: 'Available offline',
    installTitle: 'Install App',
    installDesc: 'Add to home screen for offline use',
    youLabel: 'YOU',
  },
  fr: {

    subtitle: 'Guide d\'étude',
    sidebarLabel: 'Progression par ceinture',
    examTitle: b => `Pour passer l'examen de ${b} :`,
    sectionExam: 'Conditions d\'examen',
    sectionTech: 'Techniques — Waza',
    sectionKata: 'Kata — 型',
    watchYoutube: '▶ Voir sur YouTube',
    watchShort: '▶ YouTube',
    toastOffline: 'Disponible hors ligne',
    installTitle: 'Installer l\'app',
    installDesc: 'Ajouter à l\'écran d\'accueil pour un usage hors ligne',
    youLabel: 'VOUS',

// STATE
// ════════════════════════════════════════════════
const beltOrder = ['white','orange','blue','yellow','green','brown','black'];
const userBelt = 'orange';
let lang = localStorage.getItem('kyokushin-lang') || 'en';
let activeBelt = 'orange';

// ════════════════════════════════════════════════
// LANGUAGE
// ════════════════════════════════════════════════
function setLang(l) {
  lang = l;
  localStorage.setItem('kyokushin-lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  document.getElementById('mainTitle').textContent = UI[l].title;
  document.getElementById('subtitleText').textContent = UI[l].subtitle;
  document.getElementById('sidebarLabel').textContent = UI[l].sidebarLabel;
  document.getElementById('toastText').textContent = UI[l].toastOffline;
  document.getElementById('ib-title').textContent = UI[l].installTitle;
  document.getElementById('ib-desc').textContent = UI[l].installDesc;
  // Rebuild sidebar names
  document.querySelectorAll('.sidebar-belt').forEach(btn => {
    const id = btn.dataset.belt;
    const belt = belts.find(b => b.id === id);
    btn.querySelector('.sidebar-belt-name').textContent = belt.name[l];
  });
  // Rebuild belt tabs (name changes)
  document.querySelectorAll('.belt-tab').forEach(btn => {
    const id = btn.dataset.belt;
    const belt = belts.find(b => b.id === id);
    const isUser = id === userBelt;
    btn.innerHTML = `<span class="belt-dot"></span>${belt.name[l].split(' ')[0]}${isUser ? ` <span class="you-badge">${UI[l].youLabel}</span>` : ''}`;
  });
  // Re-render current panel
  renderPanel(activeBelt);
}

// ════════════════════════════════════════════════
// BUILD UI
// ════════════════════════════════════════════════
function buildProgressPath() {
  const c = document.getElementById('progressPath');
  const userIdx = beltOrder.indexOf(userBelt);
  beltOrder.forEach((id, i) => {
    const belt = belts.find(b => b.id === id);
    const status = i < userIdx ? 'achieved' : i === userIdx ? 'current' : 'future';
    const node = document.createElement('div');
    node.className = `progress-node ${status}`;
    node.innerHTML = `<div class="progress-dot" style="background:${belt.color};border-color:${belt.color}"></div>
      <span class="progress-label">${id.slice(0,3)}</span>`;
    node.onclick = () => switchBelt(id);
    c.appendChild(node);
    if (i < beltOrder.length - 1) {
      const line = document.createElement('div'); line.className = 'progress-line'; c.appendChild(line);
    }
  });
}

function buildBeltNav() {
  const nav = document.getElementById('beltNav');
  beltOrder.forEach(id => {
    const belt = belts.find(b => b.id === id);
    const isUser = id === userBelt;
    const btn = document.createElement('button');
    btn.className = `belt-tab${isUser ? ' active' : ''}`;
    btn.dataset.belt = id;
    btn.innerHTML = `<span class="belt-dot"></span>${belt.name[lang].split(' ')[0]}${isUser ? ` <span class="you-badge">${UI[lang].youLabel}</span>` : ''}`;
    btn.onclick = () => switchBelt(id);
    nav.appendChild(btn);
  });
}

function buildSidebar() {
  const container = document.getElementById('sidebarBelts');
  if (!container) return;
  const userIdx = beltOrder.indexOf(userBelt);
  beltOrder.forEach((id, i) => {
    const belt = belts.find(b => b.id === id);
    const isUser = id === userBelt;
    const btn = document.createElement('button');
    btn.className = `sidebar-belt${isUser ? ' active' : ''}`;
    btn.dataset.belt = id;
    btn.style.opacity = i <= userIdx ? '1' : '0.4';
    btn.innerHTML = `
      <div class="sidebar-belt-swatch" style="background:${belt.color};box-shadow:0 2px 6px ${belt.color}55"></div>
      <div class="sidebar-belt-info">
        <div class="sidebar-belt-name">${belt.name[lang]}</div>
        <div class="sidebar-belt-kyu">${belt.kyu}</div>
      </div>
      ${isUser ? `<span class="sidebar-you">${UI[lang].youLabel}</span>` : ''}
    `;
    btn.onclick = () => switchBelt(id);
    container.appendChild(btn);
  });
}

// ════════════════════════════════════════════════
// RENDER PANEL
// ════════════════════════════════════════════════
function buildPanel(belt) {
  const L = lang;
  const ui = UI[L];
  return `
    <div class="belt-hero" style="border-top:2px solid ${belt.borderTop}">
      <div class="belt-visual" style="background:${belt.color};box-shadow:0 4px 20px ${belt.color}44"></div>
      <div class="belt-hero-text">
        <div class="kyu">${belt.kyu} · ${belt.nameJP}</div>
        <h2>${belt.name[L]}</h2>
        <p>${belt.desc[L]}</p>
      </div>
    </div>

    <div class="section-header"><h3>${ui.sectionExam}</h3></div>
    <div class="exam-box">
      <h4>${ui.examTitle(belt.name[L])}</h4>
      <ul class="exam-list">${belt.examRequirements[L].map(r=>`<li>${r}</li>`).join('')}</ul>
    </div>

    <div class="section-header"><h3>${ui.sectionTech}</h3></div>
    <div class="techniques-grid">${belt.techniques.map(t=>buildTechCard(t, ui)).join('')}</div>

    ${belt.kata.length ? `
    <div class="section-header"><h3>${ui.sectionKata}</h3></div>
    ${belt.kata.map((k,i)=>`
      <div class="kata-card">
        <div class="kata-number">${String(i+1).padStart(2,'0')}</div>
        <div class="kata-info">
          <h4>${k.name}</h4>
          <div class="kata-meaning">${k.meaning[L]}</div>
          <p class="kata-desc">${k.desc[L]}</p>
          <a href="https://www.youtube.com/results?search_query=kyokushin+${encodeURIComponent(k.name.toLowerCase())}+kata" target="_blank" class="video-link">${ui.watchYoutube}</a>
        </div>
      </div>`).join('')}` : ''}
  `;
}

function buildTechCard(t, ui) {
  const figSvg = (typeof getFig !== 'undefined') ? getFig(t.romaji) : null;
  return `<div class="technique-card">
    ${figSvg ? figSvg : ''}
    <div class="technique-card-body">
      <div class="technique-japanese">${t.japanese}</div>
      <div class="technique-romaji">${t.romaji}</div>
      <div class="technique-english">${lang === 'fr' ? t.french : t.english}</div>
      <p class="technique-desc">${t.desc[lang]}</p>
      <div class="technique-footer">
        <span class="technique-tag tag-${t.tag}">${t.tag.replace('-',' ')}</span>
        <a href="${t.video}" target="_blank" class="video-link">${ui.watchShort}</a>
      </div>
    </div>
  </div>`;
}

function renderPanel(id) {
  document.getElementById('mainContent').innerHTML = buildPanel(belts.find(b=>b.id===id));
}

function switchBelt(id) {
  activeBelt = id;
  document.querySelectorAll('.belt-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.belt-tab[data-belt="${id}"]`).classList.add('active');
  document.querySelectorAll('.sidebar-belt').forEach(t=>t.classList.remove('active'));
  const sb = document.querySelector(`.sidebar-belt[data-belt="${id}"]`);
  if (sb) sb.classList.add('active');
  renderPanel(id);
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── PWA: SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const toast = document.getElementById('offlineToast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      });
    });
  });
}

// ── PWA: INSTALL PROMPT ──
let deferredPrompt;
const banner = document.getElementById('installBanner');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e; banner.style.display = 'flex';
});
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null; banner.style.display = 'none';
};
document.getElementById('dismissBtn').onclick = () => { banner.style.display = 'none'; };
window.addEventListener('appinstalled', () => { banner.style.display = 'none'; });

// ── INIT ──
// Apply saved language to button state
document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
document.querySelector(`.lang-btn[data-lang="${lang === 'en' ? 'fr' : 'en'}"]`).classList.remove('active');
if (lang === 'fr') {
  document.getElementById('mainTitle').textContent = UI.fr.title;
  document.getElementById('subtitleText').textContent = UI.fr.subtitle;
}
buildProgressPath();
buildBeltNav();
buildSidebar();
switchBelt('orange');
</script>
</body>
</html>
