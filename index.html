<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kyokushin">
<meta name="theme-color" content="#0a0a0c">
<meta name="description" content="Belt-by-belt Kyokushin Karate study guide">
<link rel="manifest" href="manifest.json">
<script src="technique-imgs.js"></script>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Kyokushin — Path of the Belt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d10;
    --red: #c0392b;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --mist: #8a8a9a;        /* was #4a4a55 — much lighter */
    --white: #f0eee8;
    --text: #dedad2;        /* body text — warm off-white */
    --text-sub: #a8a49c;    /* secondary text — visible but softer */
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.10);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { scroll-behavior:smooth; }
  body {
    background:var(--ink); color:var(--white);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    min-height:100vh; min-height:100dvh;
    overflow-x:hidden; overscroll-behavior:none;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:9999; opacity:0.35;
  }

  /* ── HEADER ── */
  header {
    padding:calc(var(--safe-top) + 40px) 20px 28px;
    text-align:center;
    border-bottom:1px solid rgba(201,168,76,0.2);
    background:radial-gradient(ellipse at 50% -10%, rgba(192,57,43,0.18) 0%, transparent 60%);
    position:relative; overflow:hidden;
  }
  header::after {
    content:'極真'; position:absolute; font-family:'Cinzel Decorative',serif;
    font-size:clamp(100px,35vw,180px); color:rgba(201,168,76,0.035);
    top:50%; left:50%; transform:translate(-50%,-38%);
    pointer-events:none; letter-spacing:-6px; white-space:nowrap;
  }
  .header-top {
    display:flex; align-items:center; justify-content:center;
    gap:12px; margin-bottom:14px; flex-wrap:wrap;
  }
  .header-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.25);
    border-radius:2px; padding:5px 12px;
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px;
    color:var(--gold); text-transform:uppercase;
  }
  h1 {
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(22px,7vw,44px); font-weight:900;
    letter-spacing:1px; line-height:1.1;
    background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 50%,#a07830 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:8px;
  }
  .subtitle { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--text-sub); text-transform:uppercase; }

  /* ── LANGUAGE SWITCHER ── */
  .lang-switcher {
    display:inline-flex; align-items:center;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:3px; overflow:hidden;
  }
  .lang-btn {
    padding:5px 10px; border:none; background:transparent;
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px;
    color:var(--mist); cursor:pointer; text-transform:uppercase;
    transition:all 0.2s; position:relative;
  }
  .lang-btn.active {
    background:rgba(201,168,76,0.15); color:var(--gold-light);
  }
  .lang-btn:not(:last-child) { border-right:1px solid rgba(255,255,255,0.08); }

  /* ── INSTALL BANNER ── */
  #installBanner {
    display:none; align-items:center; justify-content:space-between;
    background:rgba(201,168,76,0.1); border-bottom:1px solid rgba(201,168,76,0.2);
    padding:10px 16px; gap:12px;
  }
  #installBanner p { font-size:14px; color:var(--text); flex:1; }
  #installBanner p strong { color:var(--gold-light); font-family:'Cinzel',serif; font-size:11px; }
  .install-btn {
    background:var(--gold); color:var(--ink); border:none; border-radius:3px;
    padding:8px 14px; font-family:'Cinzel',serif; font-size:10px;
    letter-spacing:1px; cursor:pointer; white-space:nowrap; font-weight:600;
  }
  .dismiss-btn { background:transparent; border:none; color:var(--mist); font-size:18px; cursor:pointer; padding:0 4px; line-height:1; }

  /* ── PROGRESS PATH ── */
  .progress-path {
    display:flex; align-items:center; justify-content:center;
    gap:0; padding:16px 12px 8px; overflow-x:auto; scrollbar-width:none;
  }
  .progress-path::-webkit-scrollbar { display:none; }
  .progress-node { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; flex-shrink:0; padding:0 2px; }
  .progress-dot { width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,0.12); transition:all 0.3s; }
  .progress-node.current .progress-dot { box-shadow:0 0 0 3px rgba(255,255,255,0.08); transform:scale(1.35); }
  .progress-node.future .progress-dot { opacity:0.3; }
  .progress-label { font-family:'Cinzel',serif; font-size:7px; letter-spacing:1px; color:var(--text-sub); text-transform:uppercase; }
  .progress-line { width:24px; height:1px; background:rgba(255,255,255,0.08); flex-shrink:0; margin-bottom:20px; }

  /* ── BELT NAV ── */
  .belt-nav {
    display:flex; overflow-x:auto; scrollbar-width:none;
    border-bottom:1px solid rgba(255,255,255,0.06);
    position:sticky; top:0; z-index:100;
    background:rgba(10,10,12,0.97); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  }
  .belt-nav::-webkit-scrollbar { display:none; }
  .belt-tab {
    flex:none; display:flex; align-items:center; gap:7px;
    padding:14px 16px; cursor:pointer; border:none;
    background:transparent; color:var(--text-sub);
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
    text-transform:uppercase; transition:color 0.25s; position:relative;
    white-space:nowrap; border-right:1px solid rgba(255,255,255,0.04);
    touch-action:manipulation;
  }
  .belt-tab::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; transform:scaleX(0); transition:transform 0.3s; }
  .belt-tab.active { color:var(--white); }
  .belt-tab.active::after { transform:scaleX(1); }
  .belt-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; border:1.5px solid rgba(255,255,255,0.15); }
  .belt-tab[data-belt="orange"] .belt-dot { background:#e07020; }
  .belt-tab[data-belt="blue"] .belt-dot { background:#1a5fa8; }
  .belt-tab[data-belt="yellow"] .belt-dot { background:#1a70b8; }
  .belt-tab[data-belt="green"] .belt-dot { background:#c8a010; }
  .belt-tab[data-belt="brown"] .belt-dot { background:#c8a010; }
  .belt-tab[data-belt="brown1"] .belt-dot { background:#6b3a1f; }
  .belt-tab[data-belt="brown1"] .belt-dot { background:#2a7a3a; }
  .belt-tab[data-belt="black"] .belt-dot { background:#2a7a3a; border-color:#3a9a4a; }
  .belt-tab[data-belt="brown2kyu"] .belt-dot { background:#6b3a1f; }
  .belt-tab[data-belt="brown1kyu"] .belt-dot { background:#6b3a1f; border-color:var(--gold); }
  .belt-tab[data-belt="shodan"] .belt-dot { background:#1a1a1a; border-color:var(--gold); }
  .belt-tab[data-belt="orange"].active::after { background:#e07020; }
  .belt-tab[data-belt="blue"].active::after { background:#1a5fa8; }
  .belt-tab[data-belt="yellow"].active::after { background:#1a70b8; }
  .belt-tab[data-belt="green"].active::after { background:#c8a010; }
  .belt-tab[data-belt="brown"].active::after { background:#c8a010; }
  .belt-tab[data-belt="brown1"].active::after { background:#2a7a3a; }
  .belt-tab[data-belt="black"].active::after { background:#2a7a3a; }
  .belt-tab[data-belt="brown2kyu"].active::after { background:#6b3a1f; }
  .belt-tab[data-belt="brown1kyu"].active::after { background:#6b3a1f; }
  .belt-tab[data-belt="shodan"].active::after { background:var(--gold); }
  .you-badge { font-size:7px; background:var(--red); color:white; padding:1px 4px; border-radius:2px; letter-spacing:1px; }

  /* ── APP SHELL ── */
  .app-shell { display:flex; min-height:calc(100vh - 120px); }
  .sidebar { display:none; }
  main { flex:1; min-width:0; max-width:800px; margin:0 auto; padding:28px 20px calc(var(--safe-bottom) + 48px); width:100%; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

  /* ── BELT HERO ── */
  .belt-hero {
    display:flex; align-items:center; gap:20px;
    margin-bottom:32px; padding:24px;
    border:1px solid rgba(255,255,255,0.07); border-radius:8px;
    background:rgba(255,255,255,0.02); position:relative; overflow:hidden;
    animation:fadeUp 0.35s ease;
  }
  .belt-visual { width:64px; height:16px; border-radius:3px; flex-shrink:0; }
  .belt-hero-text .kyu { font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; color:var(--text-sub); text-transform:uppercase; margin-bottom:6px; }
  .belt-hero-text h2 { font-family:'Cinzel Decorative',serif; font-size:clamp(20px,3vw,30px); margin-bottom:10px; color:var(--white); }
  .belt-hero-text p { font-size:clamp(15px,1.4vw,17px); color:var(--text); line-height:1.7; font-weight:300; }

  /* ── SECTION HEADERS ── */
  .section-header { display:flex; align-items:center; gap:14px; margin:36px 0 18px; }
  .section-header h3 { font-family:'Cinzel',serif; font-size:12px; letter-spacing:4px; text-transform:uppercase; color:var(--gold-light); white-space:nowrap; }
  .section-header::after { content:''; flex:1; height:1px; background:linear-gradient(to right,rgba(201,168,76,0.25),transparent); }

  /* ── EXAM BOX ── */
  .exam-box { background:rgba(201,168,76,0.06); border:1px solid rgba(201,168,76,0.22); border-radius:8px; padding:24px; margin-bottom:8px; }
  .exam-box h4 { font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--gold-light); margin-bottom:16px; }
  .exam-list { list-style:none; display:grid; grid-template-columns:1fr; gap:9px; }
  .exam-list li { display:flex; align-items:flex-start; gap:10px; font-size:clamp(15px,1.3vw,16px); color:var(--text); line-height:1.6; font-weight:400; overflow-wrap:break-word; min-width:0; }
  .exam-list li::before { content:'◆'; color:var(--gold); font-size:7px; margin-top:6px; flex-shrink:0; }


  /* ── TECHNIQUE FIGURE ── */
  .tech-fig {
    width: 100%;
    height: 190px;
    object-fit: contain;
    object-position: center;
    display: block;
    padding: 10px;
    background: #eee1cc;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px 8px 0 0;
  }
  .technique-card-body { padding: 16px; }
  /* ── TECHNIQUE CARDS ── */
  .techniques-grid { display:grid; grid-template-columns:1fr; gap:14px; }
  .technique-card {
    background:rgba(255,255,255,0.04); border:1px solid var(--border);
    border-radius:8px; overflow:hidden;
    transition:border-color 0.25s,transform 0.2s,box-shadow 0.2s; animation:fadeUp 0.35s ease;
  }
  .technique-card:hover { border-color:rgba(201,168,76,0.3); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .technique-card:active { background:rgba(255,255,255,0.04); }
  .technique-card-body { padding:20px; }
  .technique-japanese { font-family:'Cinzel',serif; font-size:clamp(20px,2.5vw,24px); font-weight:600; color:var(--gold-light); margin-bottom:3px; }
  .technique-romaji { font-size:13px; letter-spacing:2px; color:var(--text-sub); margin-bottom:8px; font-family:'Cinzel',serif; font-style:italic; }
  .technique-english { font-size:clamp(16px,1.5vw,19px); font-weight:600; color:var(--white); margin-bottom:10px; letter-spacing:-0.2px; }
  .technique-desc { font-size:clamp(14px,1.2vw,15px); color:var(--text); line-height:1.75; font-weight:400; }
  .technique-footer { display:flex; align-items:center; justify-content:space-between; margin-top:14px; flex-wrap:wrap; gap:8px; }
  .technique-tag { font-family:'Inter',sans-serif; font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
  .tag-kihon { background:rgba(192,57,43,0.22); color:#f08878; border:1px solid rgba(192,57,43,0.4); }
  .tag-kata { background:rgba(26,95,168,0.22); color:#78a8f0; border:1px solid rgba(26,95,168,0.4); }
  .tag-kumite { background:rgba(42,122,58,0.22); color:#72d080; border:1px solid rgba(42,122,58,0.4); }
  .tag-kihon-waza { background:rgba(150,80,20,0.22); color:#e0a860; border:1px solid rgba(150,80,20,0.4); }
  .video-link {
    display:inline-flex; align-items:center; gap:6px;
    padding:7px 14px; background:rgba(192,57,43,0.12);
    border:1px solid rgba(192,57,43,0.25); border-radius:3px;
    color:#f08878; text-decoration:none;
    font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:1px;
    text-transform:uppercase; transition:background 0.2s,color 0.2s; touch-action:manipulation;
  }
  .video-link:hover { background:rgba(192,57,43,0.25); color:#ff9080; }

  /* ── KATA CARDS ── */
  .kata-card {
    display:flex; gap:20px; background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.06); border-radius:8px;
    padding:20px; margin-bottom:12px; transition:border-color 0.25s,background 0.25s;
  }
  .kata-card:hover { border-color:rgba(26,95,168,0.35); background:rgba(26,95,168,0.04); }
  .kata-number { font-family:'Cinzel Decorative',serif; font-size:clamp(20px,2.5vw,32px); color:rgba(255,255,255,0.12); flex-shrink:0; width:40px; line-height:1; }
  .kata-info h4 { font-family:'Cinzel',serif; font-size:clamp(16px,1.5vw,18px); color:var(--gold-light); margin-bottom:4px; }
  .kata-meaning { font-size:13px; color:var(--text-sub); font-style:italic; margin-bottom:8px; font-family:'Inter',sans-serif; }
  .kata-desc { font-size:clamp(14px,1.2vw,15px); color:var(--text); line-height:1.75; }

  /* ── OFFLINE TOAST ── */
  #offlineToast {
    position:fixed; bottom:calc(var(--safe-bottom) + 16px); left:50%;
    transform:translateX(-50%) translateY(80px);
    background:#1a1a1a; border:1px solid rgba(201,168,76,0.3);
    color:var(--gold-light); padding:10px 20px; border-radius:4px;
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px;
    transition:transform 0.4s; z-index:10000; white-space:nowrap;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }
  #offlineToast.show { transform:translateX(-50%) translateY(0); }

  /* ── TABLET ≥ 700px ── */
  @media (min-width:700px) {
    .belt-nav { justify-content:center; }
    .belt-tab { padding:16px 22px; font-size:11px; }
    .belt-dot { width:12px; height:12px; }
    .exam-list { grid-template-columns:1fr 1fr; }
    .techniques-grid { grid-template-columns:1fr 1fr; }
    main { padding:36px 32px calc(var(--safe-bottom) + 48px); }
    .belt-hero { padding:28px 32px; }
    .belt-visual { width:80px; height:20px; }
    .progress-line { width:40px; }
    .progress-dot { width:18px; height:18px; }
    .progress-label { font-size:8px; }
  }

  /* ── DESKTOP ≥ 1024px ── */
  @media (min-width:1024px) {
    header { padding:calc(var(--safe-top) + 56px) 40px 40px; }
    h1 { font-size:clamp(36px,4vw,56px); }
    .subtitle { font-size:12px; letter-spacing:5px; }
    .header-badge { font-size:10px; }
    .progress-dot { width:20px; height:20px; }
    .progress-line { width:56px; }
    .progress-label { font-size:9px; }
    .belt-nav { justify-content:center; }
    .belt-tab { padding:18px 28px; font-size:11px; letter-spacing:3px; }
    .app-shell { max-width:1280px; margin:0 auto; }
    .sidebar {
      display:flex; flex-direction:column;
      width:260px; flex-shrink:0;
      padding:36px 0 36px 36px;
      position:sticky; top:52px;
      height:calc(100vh - 52px);
      overflow-y:auto; scrollbar-width:none;
      border-right:1px solid rgba(255,255,255,0.05);
    }
    .sidebar::-webkit-scrollbar { display:none; }
    .sidebar-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--text-sub); margin-bottom:20px; }
    .sidebar-belt {
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; border-radius:6px; cursor:pointer;
      border:1px solid transparent; transition:all 0.25s;
      margin-bottom:4px; text-align:left; background:transparent;
      color:var(--text-sub); font-family:'Inter',sans-serif; font-size:13px; font-weight:400;
    }
    .sidebar-belt:hover { background:rgba(255,255,255,0.04); color:var(--white); }
    .sidebar-belt.active { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.08); color:var(--white); }
    .sidebar-belt-swatch { width:28px; height:8px; border-radius:2px; flex-shrink:0; }
    .sidebar-belt-info { flex:1; }
    .sidebar-belt-name { font-size:13px; font-weight:500; margin-bottom:2px; }
    .sidebar-belt-kyu { font-size:11px; color:var(--text-sub); }
    .sidebar-you { font-size:7px; background:var(--red); color:white; padding:1px 5px; border-radius:2px; }
    .sidebar-divider { height:1px; background:rgba(255,255,255,0.06); margin:16px 0; }
    main { flex:1; max-width:none; padding:36px 48px calc(var(--safe-bottom) + 60px); }
    .techniques-grid { grid-template-columns:repeat(3,1fr); }
    .exam-list { grid-template-columns:1fr 1fr; }
    .kata-card { padding:24px 28px; gap:24px; }
    .kata-number { font-size:36px; width:48px; }
    .belt-hero { padding:32px 36px; gap:28px; }
    .belt-visual { width:100px; height:24px; }
  }

  /* ── WIDE DESKTOP ≥ 1400px ── */
  @media (min-width:1400px) {
    .sidebar { width:300px; padding-left:48px; }
    main { padding:48px 64px calc(var(--safe-bottom) + 60px); }
    .techniques-grid { grid-template-columns:repeat(3,1fr); gap:18px; }
    .exam-list { grid-template-columns:1fr 1fr 1fr; }
  }

  /* ── IMAGE MODAL ── */
  #imageModal {
    display: none;
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
    padding: 0;
    overscroll-behavior: contain;
  }
  #imageModal.open { display: flex; animation: modalIn 0.22s ease; }
  @keyframes modalIn {
    from { opacity:0; transform:scale(0.96); }
    to   { opacity:1; transform:scale(1); }
  }
  .modal-box {
    position: relative;
    width: min(96vw, 560px);
    max-height: 92dvh;
    background: #13120f;
    border-radius: 12px;
    border: 1px solid rgba(201,168,76,0.25);
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7);
  }
  .modal-close {
    position: absolute; top: 10px; right: 12px; z-index: 2;
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
    color: var(--text); font-size: 16px; width: 32px; height: 32px;
    border-radius: 50%; cursor: pointer; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .modal-close:hover { background: rgba(192,57,43,0.5); }
  .modal-label {
    padding: 14px 44px 14px 18px;
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold-light);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .modal-img-wrap {

// Pre-sort keys longest-first so compound terms match before their components
const _GKEYS = Object.keys(GLOSSARY).sort((a, b) => b.length - a.length);

function addTooltips(text) {
  // Segment approach: track already-replaced spans to avoid double-wrapping
  let segs = [{t: text, done: false}];
  for (const key of _GKEYS) {
    const esc = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const rx  = new RegExp('\\b' + esc + '\\b', 'gi');
    const tip = GLOSSARY[key].replace(/"/g, '&quot;');
    const next = [];
    for (const seg of segs) {
      if (seg.done) { next.push(seg); continue; }
      const parts = seg.t.split(rx);
      const hits  = seg.t.match(rx);
      if (!hits) { next.push(seg); continue; }
      for (let i = 0; i < parts.length; i++) {
        if (parts[i]) next.push({t: parts[i], done: false});
        if (i < hits.length)
          next.push({t: `<span class="jp-tip" data-tip="${tip}">${hits[i]}</span>`, done: true});
      }
    }
    segs = next;
  }
  return segs.map(s => s.t).join('');
}

  const savedBelt = localStorage.getItem('kyokushin-my-belt') || userBelt;

    const id = btn.dataset.belt;
    const belt = belts.find(b => b.id === id);
    const isUser = id === userBeltMutable;
    const lbl = (tabLabelsLang[l] && tabLabelsLang[l][id]) || belt.name[l].split(' ')[0];
    btn.innerHTML = `<span class="belt-dot"></span>${lbl}${isUser ? ` <span class="you-badge">${UI[l].youLabel}</span>` : ''}`;
  });
  // Re-render current panel
  renderPanel(activeBelt);
  // Rebuild progress with current belt
  const pc = document.getElementById('progressPath');
  pc.innerHTML = '';
  buildProgressPathDynamic();
  updateMyBeltButton();
  // Rebuild glossary (descriptions are localized)
  if (glossaryActiveRomaji) openGlossaryDetail(glossaryActiveRomaji);
  else buildGlossaryList();
}

function buildProgressPath() {
  const c = document.getElementById('progressPath');
  const userIdx = beltOrder.indexOf(userBeltMutable);
  const kyuLabels = {
    orange:'10', blue:'9', yellow:'7', green:'6',
    brown:'5', brown1:'4', black:'3', brown2kyu:'2', brown1kyu:'1', shodan:'Dan'
  };
  beltOrder.forEach((id, i) => {
    const belt = belts.find(b => b.id === id);
    const status = i < userIdx ? 'achieved' : i === userIdx ? 'current' : 'future';
    const node = document.createElement('div');
    node.className = `progress-node ${status}`;
    node.innerHTML = `<div class="progress-dot" style="background:${belt.color};border-color:${belt.color}"></div>
      <span class="progress-label">${kyuLabels[id] || id.slice(0,2)}</span>`;
    node.onclick = () => switchBelt(id);
    c.appendChild(node);
    if (i < beltOrder.length - 1) {
      const line = document.createElement('div'); line.className = 'progress-line'; c.appendChild(line);
    }
  });
}

function buildSidebar() {
  const container = document.getElementById('sidebarBelts');
  if (!container) return;
  const userIdx = beltOrder.indexOf(userBeltMutable);
  beltOrder.forEach(id => {
    const belt = belts.find(b => b.id === id);
    const isUser = id === userBeltMutable;
    const beltIdx = beltOrder.indexOf(id);
    const btn = document.createElement('button');
    btn.className = `sidebar-belt${isUser ? ' active' : ''}`;
    btn.dataset.belt = id;
    btn.style.opacity = beltIdx <= userIdx ? '1' : '0.4';
    // For stripe belts, show a two-tone swatch
    const swatchStyle = id.includes('bar') || id === 'yellow' || id === 'brown' || id === 'black'
      ? `background:linear-gradient(90deg,${belt.color} 70%,#6b3a1f 70%);box-shadow:0 2px 6px ${belt.color}55`
      : `background:${belt.color};box-shadow:0 2px 6px ${belt.color}55`;
    btn.innerHTML = `
      <div class="sidebar-belt-swatch" style="${swatchStyle}"></div>
      <div class="sidebar-belt-info">
        <div class="sidebar-belt-name">${belt.name[lang]}</div>
        <div class="sidebar-belt-kyu">${belt.kyu}</div>
      </div>
      ${isUser ? `<span class="sidebar-you">${UI[lang].youLabel}</span>` : ''}

    btn.onclick = () => switchBelt(id);
    container.appendChild(btn);
  });
}

function buildPanel(belt) {
  const L = lang;
  const ui = UI[L];
  return `
    <div class="belt-hero" style="border-top:2px solid ${belt.borderTop}">
      <div class="belt-visual" style="background:${belt.color};box-shadow:0 4px 20px ${belt.color}44"></div>
      <div class="belt-hero-text">
        <div class="kyu">${belt.kyu} · ${belt.nameJP}</div>
        <h2>${belt.name[L]}</h2>
        <p>${addTooltips(belt.desc[L])}</p>
      </div>
    </div>

    <div class="section-header"><h3>${ui.sectionExam}</h3></div>
    <div class="exam-box">
      <h4>${ui.examTitle(belt.name[L])}</h4>
      <ul class="exam-list">${belt.examRequirements[L].map(r=>`<li>${addTooltips(r)}</li>`).join('')}</ul>
    </div>

    <div class="section-header"><h3>${ui.sectionTech}</h3></div>
    <div class="techniques-grid">${belt.techniques.map(t=>buildTechCard(t, ui)).join('')}</div>

    ${belt.kata.length ? `
    <div class="section-header"><h3>${ui.sectionKata}</h3></div>
    ${belt.kata.map((k,i)=>`
      <div class="kata-card">
        <div class="kata-number">${String(i+1).padStart(2,'0')}</div>
        <div class="kata-info">
          <h4>${k.name}</h4>
          <div class="kata-meaning">${k.meaning[L]}</div>
          <p class="kata-desc">${k.desc[L]}</p>
          <a href="https://www.youtube.com/results?search_query=kyokushin+${encodeURIComponent(k.name.toLowerCase())}+kata" target="_blank" class="video-link">${ui.watchYoutube}</a>
        </div>
      </div>`).join('')}` : ''}
  `;
}

function buildTechCard(t, ui) {
  const displayName = lang === 'fr' ? t.french : t.english;
  const imageKey = t.imageKey || t.romaji;
  const figSrc = (typeof getTechniqueImage !== 'undefined')
    ? getTechniqueImage(imageKey)
    : null;
  const figHtml = (typeof getTechniqueFig !== 'undefined')
    ? getTechniqueFig(imageKey, displayName)
    : null;
  const label = `${t.japanese}  ${t.romaji}  —  ${displayName}`;
  const escapedLabel = jsString(label);
  const escapedFigSrc = jsString(figSrc || '');
  const titleHtml = `
        <div class="technique-japanese">${t.japanese}</div>
        <div class="technique-romaji">${t.romaji}</div>
        <div class="technique-english">${displayName}</div>
      `;
  return `<div class="technique-card">
    ${figHtml ? `<button class="tech-name-btn" onclick="openImageModal('${escapedLabel}', '${escapedFigSrc}')" aria-label="Open image for ${displayName}">${figHtml}</button>` : ''}
    <div class="technique-card-body">
      ${figSrc
        ? `<button class="tech-name-btn" onclick="openImageModal('${escapedLabel}', '${escapedFigSrc}')">${titleHtml}</button>`
        : `<div>${titleHtml}</div>`}
      <p class="technique-desc">${addTooltips(t.desc[lang])}</p>
      <div class="technique-footer">
        <span class="technique-tag tag-${t.tag}">${t.tag.replace('-',' ')}</span>
        <a href="${t.video}" target="_blank" class="video-link">${ui.watchShort}</a>
      </div>
    </div>
  </div>`;
}

function jsString(value) {
  return String(value)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'");
}

function renderPanel(id) {
  document.getElementById('mainContent').innerHTML = buildPanel(belts.find(b=>b.id===id));
}

function switchBelt(id) {
  activeBelt = id;
  document.querySelectorAll('.belt-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.belt-tab[data-belt="${id}"]`).classList.add('active');
  document.querySelectorAll('.sidebar-belt').forEach(t=>t.classList.remove('active'));
  const sb = document.querySelector(`.sidebar-belt[data-belt="${id}"]`);
  if (sb) sb.classList.add('active');
  renderPanel(id);
  window.scrollTo({top:0, behavior:'smooth'});
}



function openImageModal(label, src) {
  if (!src) return;

  const modal = document.getElementById('imageModal');
  const img   = document.getElementById('modalTechniqueImage');
  const lbl   = document.getElementById('modalLabel');
  img.src = src;
  img.alt = label || 'Technique image';
  lbl.textContent = label || 'Technique image';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeImageModal() {
  document.getElementById('imageModal').classList.remove('open');
  document.getElementById('modalTechniqueImage').removeAttribute('src');
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('imageModal')) closeImageModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeImageModal();
});


// ── BELT PICKER ──────────────────────────────────────────────────────
let userBeltMutable = getStoredBelt();

const tabLabelsForPicker = {
  en: { orange:'Orange Belt', blue:'Blue Belt',
        yellow:'Blue Stripe Belt', green:'Yellow Belt', brown:'Yellow Stripe Belt',
        brown1:'Green Belt', black:'Green Stripe Belt',
        brown2kyu:'Brown Belt', brown1kyu:'Brown Belt 1st Kyu', shodan:'Black Belt — Shodan' },
  fr: { orange:'Ceinture Orange', blue:'Ceinture Bleue',
        yellow:'Ceinture Bleue Barrette', green:'Ceinture Jaune', brown:'Ceinture Jaune Barrette',
        brown1:'Ceinture Verte', black:'Ceinture Verte Barrette',
        brown2kyu:'Ceinture Marron', brown1kyu:'Ceinture Marron 1er Kyu', shodan:'Ceinture Noire — Shodan' }
};

function getMyBelt() { return userBeltMutable; }

function updateMyBeltButton() {
  const belt = belts.find(b => b.id === userBeltMutable);
  if (!belt) return;
  const swatch = document.getElementById('myBeltSwatch');
  const label  = document.getElementById('myBeltLabel');
  if (swatch) swatch.style.cssText = `background:${belt.color};border-color:${belt.color};width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.2)`;
  if (label)  label.textContent = (tabLabelsForPicker[lang] && tabLabelsForPicker[lang][userBeltMutable]) || belt.name[lang];
}

function buildPickerList() {
  const list = document.getElementById('pickerList');
  if (!list) return;
  list.innerHTML = '';
  beltOrder.forEach(id => {
    const belt = belts.find(b => b.id === id);
    const isSelected = id === userBeltMutable;
    const item = document.createElement('button');
    item.className = `picker-item${isSelected ? ' active' : ''}`;
    item.dataset.belt = id;

    // Two-tone swatch for stripe belts
    const isStripe = ['yellow','brown','black','brown1kyu'].includes(id);
    const swatchStyle = isStripe
      ? `background:linear-gradient(90deg,${belt.color} 65%,#5a3010 65%)`
      : `background:${belt.color}`;

    const displayName = (tabLabelsForPicker[lang] && tabLabelsForPicker[lang][id]) || belt.name[lang];

    item.innerHTML = `
      <div class="picker-swatch" style="${swatchStyle}"></div>
      <div class="picker-info">
        <div class="picker-name">${displayName}</div>
        <div class="picker-kyu">${belt.kyu} · ${belt.nameJP}</div>
      </div>
      <span class="picker-check">✓</span>
    `;
    item.onclick = () => selectMyBelt(id);
    list.appendChild(item);
  });
}

function openBeltPicker() {
  document.getElementById('pickerTitle').textContent =
    lang === 'fr' ? 'Ma ceinture actuelle' : 'My Current Belt';
  buildPickerList();
  document.getElementById('beltPickerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeBeltPicker() {
  document.getElementById('beltPickerModal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeBeltPickerOnBg(e) {
  if (e.target === document.getElementById('beltPickerModal')) closeBeltPicker();
}

function selectMyBelt(id) {
  userBeltMutable = id;
  localStorage.setItem('kyokushin-my-belt', id);

  // Update picker UI
  document.querySelectorAll('.picker-item').forEach(el => {
    el.classList.toggle('active', el.dataset.belt === id);
  });

  // Update header button
  updateMyBeltButton();

  // Update progress path dots (re-render)
  const c = document.getElementById('progressPath');
  c.innerHTML = '';
  buildProgressPathDynamic();

  // Update sidebar opacity
  document.querySelectorAll('.sidebar-belt').forEach((btn, i) => {
    const beltIdx = beltOrder.indexOf(btn.dataset.belt);
    const userIdx = beltOrder.indexOf(userBeltMutable);
    btn.style.opacity = beltIdx <= userIdx ? '1' : '0.4';
  });

  // YOU badge on tabs
  document.querySelectorAll('.belt-tab .you-badge').forEach(b => b.remove());
  const activeTab = document.querySelector(`.belt-tab[data-belt="${id}"]`);
  if (activeTab) {
    const badge = document.createElement('span');
    badge.className = 'you-badge';
    badge.textContent = UI[lang].youLabel;
    activeTab.appendChild(badge);
  }

  // Close after short delay for satisfying feedback
  setTimeout(closeBeltPicker, 280);
}

// Separate progress path builder that uses userBeltMutable
function buildProgressPathDynamic() {
  const c = document.getElementById('progressPath');
  const userIdx = beltOrder.indexOf(userBeltMutable);
  const kyuLabels = {
    orange:'10', blue:'9', yellow:'7', green:'6',
    brown:'5', brown1:'4', black:'3', brown2kyu:'2', brown1kyu:'1', shodan:'Dan'
  };
  beltOrder.forEach((id, i) => {
    const belt = belts.find(b => b.id === id);
    const status = i < userIdx ? 'achieved' : i === userIdx ? 'current' : 'future';
    const node = document.createElement('div');
    node.className = `progress-node ${status}`;
    node.innerHTML = `<div class="progress-dot" style="background:${belt.color};border-color:${belt.color}"></div>
      <span class="progress-label">${kyuLabels[id] || id.slice(0,2)}</span>`;
    node.onclick = () => switchBelt(id);
    c.appendChild(node);
    if (i < beltOrder.length - 1) {
      const line = document.createElement('div'); line.className = 'progress-line'; c.appendChild(line);
    }
  });
}

// ── PWA: SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const toast = document.getElementById('offlineToast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      });
    });
  });
}

// ── PWA: INSTALL PROMPT ──
let deferredPrompt;
const banner = document.getElementById('installBanner');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e; banner.style.display = 'flex';
});
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null; banner.style.display = 'none';
};
document.getElementById('dismissBtn').onclick = () => { banner.style.display = 'none'; };
window.addEventListener('appinstalled', () => { banner.style.display = 'none'; });

// ════════════════════════════════════════════════
// GLOSSARY PANEL
// ════════════════════════════════════════════════
const glossaryTerms = (() => {
  const seen = new Set();
  const list = [];
  for (const belt of belts) {
    for (const t of belt.techniques) {
      if (!seen.has(t.romaji)) {
        seen.add(t.romaji);
        list.push(t);
      }
    }
  }
  return list.sort((a, b) => a.romaji.localeCompare(b.romaji));
})();

const TAG_COLORS = {
  kihon: '#f08878', kata: '#78a8f0', kumite: '#72d080', 'kihon-waza': '#e0a860'
};

let glossaryFilter = '';
let glossaryActiveRomaji = null;

function openGlossaryPanel() {
  if (window.innerWidth >= 1280) return;
  document.getElementById('glossaryPanel').classList.add('open');
  document.getElementById('glossaryBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeGlossaryPanel() {
  document.getElementById('glossaryPanel').classList.remove('open');
  document.getElementById('glossaryBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function buildGlossaryList() {
  const container = document.getElementById('glossaryList');
  if (!container) return;
  const q = glossaryFilter.toLowerCase();
  const L = lang;
  const filtered = q
    ? glossaryTerms.filter(t =>
        (t.romaji || '').toLowerCase().includes(q) ||
        (t.japanese || '').includes(q) ||
        (t.english || '').toLowerCase().includes(q) ||
        (t.french || '').toLowerCase().includes(q))
    : glossaryTerms;

  if (!filtered.length) {
    container.innerHTML = `<p style="padding:20px 14px;color:var(--text-sub);font-size:12px;text-align:center">No terms found</p>`;
    return;
  }

  container.innerHTML = filtered.map(t => `
    <div class="glossary-item${glossaryActiveRomaji === t.romaji ? ' g-active' : ''}"
         onclick="openGlossaryDetail('${jsString(t.romaji)}')">
      <div class="glossary-item-dot" style="background:${TAG_COLORS[t.tag] || '#888'}"></div>
      <div class="glossary-item-text">
        <div class="glossary-item-romaji">${t.romaji}</div>
        <div class="glossary-item-jp">${t.japanese}</div>
      </div>
    </div>`).join('');
}

function filterGlossary(val) {
  glossaryFilter = val;
  buildGlossaryList();
}

function openGlossaryDetail(romaji) {
  const t = glossaryTerms.find(x => x.romaji === romaji);
  if (!t) return;
  glossaryActiveRomaji = romaji;

  const L = lang;
  const displayName = L === 'fr' ? t.french : t.english;
  const imageKey = t.imageKey || null;
  const imgSrc = imageKey && typeof getTechniqueImage !== 'undefined'
    ? getTechniqueImage(imageKey) : null;

  const detail = document.getElementById('glossaryDetail');
  const listView = document.getElementById('glossaryListView');

  const imgHtml = imgSrc
    ? `<img class="glossary-detail-img" src="${jsString(imgSrc)}" alt="${displayName}">`
    : `<div class="glossary-no-img">${t.japanese}</div>`;

  detail.innerHTML = `
    <button class="glossary-detail-back" onclick="closeGlossaryDetail()">← All techniques</button>
    <div class="glossary-detail-scroll">
      ${imgHtml}
      <div class="glossary-detail-body">
        <div class="glossary-detail-jp">${t.japanese}</div>
        <div class="glossary-detail-romaji">${t.romaji}</div>
        <div class="glossary-detail-en">${displayName}</div>
        <p class="glossary-detail-desc">${t.desc[L]}</p>
        <div class="glossary-detail-footer">
          <span class="technique-tag tag-${t.tag}">${t.tag.replace('-',' ')}</span>
          <a href="${t.video}" target="_blank" class="glossary-detail-video">▶ YouTube</a>
        </div>
      </div>
    </div>`;

  listView.classList.add('g-hidden');
  detail.classList.add('g-active');
  buildGlossaryList(); // refresh active highlight
}

function closeGlossaryDetail() {
  glossaryActiveRomaji = null;
  document.getElementById('glossaryDetail').classList.remove('g-active');
  document.getElementById('glossaryListView').classList.remove('g-hidden');
  buildGlossaryList();
}

// ── TOOLTIP TOUCH SUPPORT ──
document.addEventListener('click', function(e) {
  const tip = e.target.closest('.jp-tip');
  if (tip) {
    e.stopPropagation();
    const wasOpen = tip.classList.contains('tip-open');
    document.querySelectorAll('.jp-tip.tip-open').forEach(el => el.classList.remove('tip-open'));
    if (!wasOpen) tip.classList.add('tip-open');
  } else {
    document.querySelectorAll('.jp-tip.tip-open').forEach(el => el.classList.remove('tip-open'));
  }
});

// ── INIT ──
// Apply saved language to button state
document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
document.querySelector(`.lang-btn[data-lang="${lang === 'en' ? 'fr' : 'en'}"]`).classList.remove('active');
if (lang === 'fr') {
  document.getElementById('mainTitle').textContent = UI.fr.title;
  document.getElementById('subtitleText').textContent = UI.fr.subtitle;
}
// Override with saved belt
userBeltMutable = getStoredBelt();
buildProgressPathDynamic();
buildBeltNav();
buildSidebar();
updateMyBeltButton();
switchBelt(userBeltMutable);
buildGlossaryList();
</script>
