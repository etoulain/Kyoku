<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kyokushin">
<meta name="theme-color" content="#0a0a0c">
<meta name="description" content="Belt-by-belt Kyokushin Karate study guide">
<link rel="manifest" href="manifest.json">
<script src="poster-imgs.js"></script>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Kyokushin — Path of the Belt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d10;
    --red: #c0392b;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --mist: #8a8a9a;        /* was #4a4a55 — much lighter */
    --white: #f0eee8;
    --text: #dedad2;        /* body text — warm off-white */
    --text-sub: #a8a49c;    /* secondary text — visible but softer */
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.10);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { scroll-behavior:smooth; }
  body {
    background:var(--ink); color:var(--white);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    min-height:100vh; min-height:100dvh;
    overflow-x:hidden; overscroll-behavior:none;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:9999; opacity:0.35;
  }

  /* ── HEADER ── */
  header {
    padding:calc(var(--safe-top) + 40px) 20px 28px;
    text-align:center;
    border-bottom:1px solid rgba(201,168,76,0.2);
    background:radial-gradient(ellipse at 50% -10%, rgba(192,57,43,0.18) 0%, transparent 60%);
    position:relative; overflow:hidden;
  }
  header::after {
    content:'極真'; position:absolute; font-family:'Cinzel Decorative',serif;
    font-size:clamp(100px,35vw,180px); color:rgba(201,168,76,0.035);
    top:50%; left:50%; transform:translate(-50%,-38%);
    pointer-events:none; letter-spacing:-6px; white-space:nowrap;
  }
  .header-top {
    display:flex; align-items:center; justify-content:center;
    gap:12px; margin-bottom:14px; flex-wrap:wrap;
  }
  .header-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.25);
    border-radius:2px; padding:5px 12px;
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px;
    color:var(--gold); text-transform:uppercase;
  }
  h1 {
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(22px,7vw,44px); font-weight:900;
    letter-spacing:1px; line-height:1.1;
    background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 50%,#a07830 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:8px;
  }
  .subtitle { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--text-sub); text-transform:uppercase; }

  /* ── LANGUAGE SWITCHER ── */
  .lang-switcher {
    display:inline-flex; align-items:center;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:3px; overflow:hidden;
  }
  .lang-btn {
    padding:5px 10px; border:none; background:transparent;
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px;
    color:var(--mist); cursor:pointer; text-transform:uppercase;
    transition:all 0.2s; position:relative;
  }
  .lang-btn.active {
    background:rgba(201,168,76,0.15); color:var(--gold-light);
  }
  .lang-btn:not(:last-child) { border-right:1px solid rgba(255,255,255,0.08); }

  /* ── INSTALL BANNER ── */
  #installBanner {
    display:none; align-items:center; justify-content:space-between;
    background:rgba(201,168,76,0.1); border-bottom:1px solid rgba(201,168,76,0.2);
    padding:10px 16px; gap:12px;
  }
  #installBanner p { font-size:14px; color:var(--text); flex:1; }
  #installBanner p strong { color:var(--gold-light); font-family:'Cinzel',serif; font-size:11px; }
  .install-btn {
    background:var(--gold); color:var(--ink); border:none; border-radius:3px;
    padding:8px 14px; font-family:'Cinzel',serif; font-size:10px;
    letter-spacing:1px; cursor:pointer; white-space:nowrap; font-weight:600;
  }
  .dismiss-btn { background:transparent; border:none; color:var(--mist); font-size:18px; cursor:pointer; padding:0 4px; line-height:1; }

  /* ── PROGRESS PATH ── */
  .progress-path {
    display:flex; align-items:center; justify-content:center;
    gap:0; padding:16px 12px 8px; overflow-x:auto; scrollbar-width:none;
  }
  .progress-path::-webkit-scrollbar { display:none; }
  .progress-node { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; flex-shrink:0; padding:0 2px; }
  .progress-dot { width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,0.12); transition:all 0.3s; }
  .progress-node.current .progress-dot { box-shadow:0 0 0 3px rgba(255,255,255,0.08); transform:scale(1.35); }
  .progress-node.future .progress-dot { opacity:0.3; }
  .progress-label { font-family:'Cinzel',serif; font-size:7px; letter-spacing:1px; color:var(--text-sub); text-transform:uppercase; }
  .progress-line { width:24px; height:1px; background:rgba(255,255,255,0.08); flex-shrink:0; margin-bottom:20px; }

  /* ── BELT NAV ── */
  .belt-nav {
    display:flex; overflow-x:auto; scrollbar-width:none;
    border-bottom:1px solid rgba(255,255,255,0.06);
    position:sticky; top:0; z-index:100;
    background:rgba(10,10,12,0.97); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  }
  .belt-nav::-webkit-scrollbar { display:none; }
  .belt-tab {
    flex:none; display:flex; align-items:center; gap:7px;
    padding:14px 16px; cursor:pointer; border:none;
    background:transparent; color:var(--text-sub);
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
    text-transform:uppercase; transition:color 0.25s; position:relative;
    white-space:nowrap; border-right:1px solid rgba(255,255,255,0.04);
    touch-action:manipulation;
  }
  .belt-tab::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; transform:scaleX(0); transition:transform 0.3s; }
  .belt-tab.active { color:var(--white); }
  .belt-tab.active::after { transform:scaleX(1); }
  .belt-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; border:1.5px solid rgba(255,255,255,0.15); }
  .belt-tab[data-belt="white"] .belt-dot { background:#e8e4dc; }
  .belt-tab[data-belt="orange"] .belt-dot { background:#e07020; }
  .belt-tab[data-belt="blue"] .belt-dot { background:#1a5fa8; }
  .belt-tab[data-belt="yellow"] .belt-dot { background:#1a70b8; }
  .belt-tab[data-belt="green"] .belt-dot { background:#c8a010; }
  .belt-tab[data-belt="brown"] .belt-dot { background:#c8a010; }
  .belt-tab[data-belt="brown1"] .belt-dot { background:#6b3a1f; }
  .belt-tab[data-belt="brown1"] .belt-dot { background:#2a7a3a; }
  .belt-tab[data-belt="black"] .belt-dot { background:#2a7a3a; border-color:#3a9a4a; }
  .belt-tab[data-belt="brown2kyu"] .belt-dot { background:#6b3a1f; }
  .belt-tab[data-belt="brown1kyu"] .belt-dot { background:#6b3a1f; border-color:var(--gold); }
  .belt-tab[data-belt="shodan"] .belt-dot { background:#1a1a1a; border-color:var(--gold); }
  .belt-tab[data-belt="white"].active::after { background:#e8e4dc; }
  .belt-tab[data-belt="orange"].active::after { background:#e07020; }
  .belt-tab[data-belt="blue"].active::after { background:#1a5fa8; }
  .belt-tab[data-belt="yellow"].active::after { background:#1a70b8; }
  .belt-tab[data-belt="green"].active::after { background:#c8a010; }
  .belt-tab[data-belt="brown"].active::after { background:#c8a010; }
  .belt-tab[data-belt="brown1"].active::after { background:#2a7a3a; }
  .belt-tab[data-belt="black"].active::after { background:#2a7a3a; }
  .belt-tab[data-belt="brown2kyu"].active::after { background:#6b3a1f; }
  .belt-tab[data-belt="brown1kyu"].active::after { background:#6b3a1f; }
  .belt-tab[data-belt="shodan"].active::after { background:var(--gold); }
  .you-badge { font-size:7px; background:var(--red); color:white; padding:1px 4px; border-radius:2px; letter-spacing:1px; }

  /* ── APP SHELL ── */
  .app-shell { display:flex; min-height:calc(100vh - 120px); }
  .sidebar { display:none; }
  main { flex:1; max-width:800px; margin:0 auto; padding:28px 20px calc(var(--safe-bottom) + 48px); width:100%; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

  /* ── TOP ACTION BAR ── */
  .top-action-bar {
    display:flex; flex-wrap:wrap; align-items:center; gap:8px;
    padding:10px 20px 10px;
    border-bottom:1px solid rgba(255,255,255,0.05);
    background:rgba(10,10,12,0.95);
  }
  /* ── POSTER BAR (legacy, unused) ── */
  .poster-bar { display:flex; flex-wrap:wrap; gap:8px; margin:0 0 24px; }
  .poster-btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:7px 14px; background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.30);
    border-radius:4px; color:var(--gold-light); font-size:12px; font-family:'Cinzel',serif;
    letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:background 0.18s,border-color 0.18s;
  }
  .poster-btn::before { content:'▭'; font-size:10px; opacity:0.55; }
  .poster-btn:hover { background:rgba(201,168,76,0.16); border-color:rgba(201,168,76,0.55); }
  .poster-btn:active { background:rgba(201,168,76,0.15); }
  .poster-btn.is-belt { border-color:rgba(201,168,76,0.5); background:rgba(201,168,76,0.12); }

  /* ── EXAM GROUP ── */
  .exam-reqs { display:flex; flex-direction:column; gap:20px; }
  .exam-group-label {
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; text-transform:uppercase;
    color:var(--gold); border-left:2px solid var(--gold); padding-left:8px; margin-bottom:8px;
  }
  /* ── JP TIPS (glossary tooltips) ── */
  .jp-tip {
    border-bottom:1px dashed rgba(201,168,76,0.65);
    cursor:pointer; position:relative; display:inline;
  }
  .jp-tip[data-romaji] { border-bottom:1px solid rgba(201,168,76,0.9); }
  .jp-tip::after {
    content: attr(data-tip);
    position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
    background:rgba(10,10,13,0.97); border:1px solid rgba(201,168,76,0.35);
    color:var(--text); font-size:12px; font-family:'Inter',sans-serif; font-weight:400;
    letter-spacing:0; text-transform:none;
    padding:6px 10px; border-radius:4px; white-space:nowrap; max-width:260px;
    white-space:normal; text-align:center;
    opacity:0; pointer-events:none; transition:opacity 0.18s; z-index:200;
  }
  .jp-tip::before {
    content:'';
    position:absolute; bottom:calc(100% + 2px); left:50%; transform:translateX(-50%);
    border:5px solid transparent; border-top-color:rgba(201,168,76,0.35);
    opacity:0; pointer-events:none; transition:opacity 0.18s; z-index:201;
  }
  @media(hover:hover) {
    .jp-tip:hover::after,
    .jp-tip:hover::before { opacity:1; }
  }
  .jp-tip.tip-open::after,
  .jp-tip.tip-open::before { opacity:1; }

  /* ── GLOSSARY PANEL ── */
  .glossary-panel { display:none; flex-direction:column; position:relative; }
  .glossary-panel.open {
    display:flex; position:fixed; right:0; top:0; bottom:0;
    width:min(340px,92vw); z-index:2000;
    background:rgba(10,10,13,0.99);
    border-left:1px solid rgba(201,168,76,0.22);
    box-shadow:-8px 0 48px rgba(0,0,0,0.55);
    animation:gSlideIn 0.26s ease;
  }
  @keyframes gSlideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
  @media (min-width:1280px) {
    .glossary-panel {
      display:flex; width:260px; flex-shrink:0;
      position:sticky; top:52px; height:calc(100vh - 52px);
      overflow:hidden; border-left:1px solid rgba(255,255,255,0.05);
    }
    .glossary-panel.open {
      position:sticky; width:260px; top:52px; right:auto; bottom:auto;
      z-index:auto; box-shadow:none; animation:none;
      background:transparent; border-left:1px solid rgba(255,255,255,0.05);
    }
  }
  @media (min-width:1400px) { .glossary-panel,.glossary-panel.open { width:280px; } }

  .glossary-panel-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 14px 12px; border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0;
  }
  .glossary-panel-title { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold-light); }
  .glossary-panel-close {
    background:rgba(255,255,255,0.07); border:none; color:var(--text-sub); font-size:14px;
    width:26px; height:26px; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background 0.2s;
  }
  .glossary-panel-close:hover { background:rgba(192,57,43,0.35); }
  @media (min-width:1280px) { .glossary-panel-close { display:none; } }

  .glossary-search-wrap { padding:10px 12px 6px; flex-shrink:0; }
  .glossary-search {
    display:block; width:100%; padding:7px 12px;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09);
    border-radius:4px; color:var(--text);
    font-family:'Inter',sans-serif; font-size:12px;
    outline:none; box-sizing:border-box;
  }
  .glossary-search:focus { border-color:rgba(201,168,76,0.45); }
  .glossary-search::placeholder { color:var(--text-sub); }

  #glossaryListView { display:flex; flex-direction:column; flex:1; overflow:hidden; }
  #glossaryListView.g-hidden { display:none; }
  .glossary-list-scroll {
    flex:1; overflow-y:auto; padding:4px 0 20px;
    scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.08) transparent;
  }
  .glossary-list-scroll::-webkit-scrollbar { width:3px; }
  .glossary-list-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

  .glossary-item {
    display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer;
    border-left:2px solid transparent; transition:background 0.14s,border-color 0.14s;
  }
  .glossary-item:hover { background:rgba(255,255,255,0.04); border-left-color:rgba(201,168,76,0.35); }
  .glossary-item.g-active { background:rgba(201,168,76,0.08); border-left-color:var(--gold); }
  .glossary-item-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; opacity:0.85; }
  .glossary-item-text { flex:1; min-width:0; }
  .glossary-item-romaji { font-size:12px; font-weight:500; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .glossary-item-jp { font-size:11px; color:var(--mist); margin-top:1px; }

  .glossary-cat-header { display:flex; align-items:center; gap:9px; padding:14px 14px 5px; margin-top:2px; }
  .glossary-cat-header.g-first { padding-top:10px; margin-top:0; }
  .glossary-cat-pip { width:18px; height:2px; border-radius:1px; flex-shrink:0; }
  .glossary-cat-name { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--text-sub); flex:1; }
  .glossary-cat-count { font-size:9px; font-family:'Inter',sans-serif; color:var(--mist); background:rgba(255,255,255,0.06); padding:1px 7px; border-radius:8px; }

  .glossary-detail { display:none; flex-direction:column; position:absolute; inset:0; background:rgba(10,10,13,1); overflow:hidden; }
  .glossary-detail.g-active { display:flex; }
  .glossary-detail-back {
    display:flex; align-items:center; gap:7px; padding:12px 14px; flex-shrink:0;
    border-bottom:1px solid rgba(255,255,255,0.06);
    border-top:none; border-left:none; border-right:none;
    background:transparent; color:var(--text-sub); font-family:'Cinzel',serif;
    font-size:9px; letter-spacing:2px; text-transform:uppercase;
    cursor:pointer; width:100%; text-align:left; transition:color 0.18s;
  }
  .glossary-detail-back:hover { color:var(--gold-light); }
  .glossary-detail-scroll { flex:1; overflow-y:auto; padding-bottom:24px; scrollbar-width:thin; }
  .glossary-detail-img { width:100%; height:170px; object-fit:contain; object-position:center; background:#eee1cc; display:block; }
  .glossary-no-img { width:100%; height:100px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.02); color:var(--text-sub); font-family:'Cinzel',serif; font-size:32px; letter-spacing:4px; }
  .glossary-detail-body { padding:14px 16px 0; }
  .glossary-detail-jp { font-family:'Cinzel',serif; font-size:22px; font-weight:600; color:var(--gold-light); margin-bottom:3px; }
  .glossary-detail-romaji { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; font-style:italic; color:var(--text-sub); margin-bottom:8px; }
  .glossary-detail-en { font-size:15px; font-weight:600; color:var(--white); margin-bottom:12px; }
  .glossary-detail-desc { font-size:12.5px; color:var(--text); line-height:1.75; margin-bottom:14px; }
  .glossary-detail-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; padding-bottom:4px; }
  .glossary-detail-video {
    display:inline-flex; align-items:center; gap:5px; padding:5px 10px;
    background:rgba(192,57,43,0.12); border:1px solid rgba(192,57,43,0.25); border-radius:3px;
    color:#f08878; text-decoration:none; font-family:'Inter',sans-serif;
    font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; transition:background 0.2s;
  }
  .glossary-detail-video:hover { background:rgba(192,57,43,0.25); }

  .glossary-fab {
    position:fixed; bottom:calc(var(--safe-bottom) + 20px); right:16px;
    width:46px; height:46px; border-radius:50%;
    background:rgba(201,168,76,0.13); border:1.5px solid rgba(201,168,76,0.4);
    color:var(--gold-light); font-size:13px; font-family:'Cinzel',serif;
    cursor:pointer; z-index:1500; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 18px rgba(0,0,0,0.45); transition:all 0.2s;
  }
  .glossary-fab:hover { background:rgba(201,168,76,0.24); transform:scale(1.06); }
  @media (min-width:1280px) { .glossary-fab { display:none; } }
  .glossary-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1999; backdrop-filter:blur(3px); }
  .glossary-backdrop.open { display:block; }

  /* ── BELT HERO ── */
  .belt-hero {
    display:flex; align-items:center; gap:20px;
    margin-bottom:32px; padding:24px;
    border:1px solid rgba(255,255,255,0.07); border-radius:8px;
    background:rgba(255,255,255,0.02); position:relative; overflow:hidden;
    animation:fadeUp 0.35s ease;
  }
  .belt-visual { width:64px; height:16px; border-radius:3px; flex-shrink:0; }
  .belt-hero-text .kyu { font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; color:var(--text-sub); text-transform:uppercase; margin-bottom:6px; }
  .belt-hero-text h2 { font-family:'Cinzel Decorative',serif; font-size:clamp(20px,3vw,30px); margin-bottom:10px; color:var(--white); }
  .belt-hero-text p { font-size:clamp(15px,1.4vw,17px); color:var(--text); line-height:1.7; font-weight:300; }

  /* ── SECTION HEADERS ── */
  .section-header { display:flex; align-items:center; gap:14px; margin:36px 0 18px; }
  .section-header h3 { font-family:'Cinzel',serif; font-size:12px; letter-spacing:4px; text-transform:uppercase; color:var(--gold-light); white-space:nowrap; }
  .section-header::after { content:''; flex:1; height:1px; background:linear-gradient(to right,rgba(201,168,76,0.25),transparent); }

  /* ── EXAM BOX ── */

function setLang(l) {
  lang = l;
  localStorage.setItem('kyokushin-lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  document.getElementById('mainTitle').textContent = UI[l].title;
  document.getElementById('subtitleText').textContent = UI[l].subtitle;
  document.getElementById('sidebarLabel').textContent = UI[l].sidebarLabel;
  document.getElementById('toastText').textContent = UI[l].toastOffline;
  document.getElementById('ib-title').textContent = UI[l].installTitle;
  document.getElementById('ib-desc').textContent = UI[l].installDesc;
  // Update top action bar poster button labels
  const btnTech = document.getElementById('btnTech');
  const btnBelts = document.getElementById('btnBelts');
  if (btnTech) btnTech.textContent = UI[l].posterTech;
  if (btnBelts) btnBelts.textContent = UI[l].posterBelts;
  // Rebuild sidebar names
  document.querySelectorAll('.sidebar-belt').forEach(btn => {
    const id = btn.dataset.belt;
    const belt = belts.find(b => b.id === id);
    btn.querySelector('.sidebar-belt-name').textContent = belt.name[l];
  });
  // Rebuild belt tabs (name changes)
  const tabLabelsLang = {
    en: { white:'White', orange:'Orange', blue:'Blue 8', yellow:'Blue 7★', green:'Yellow 6',
          brown:'Yellow 5★', brown1:'Green 4', black:'Green 3★', brown2kyu:'Brown 2', brown1kyu:'Brown 1', shodan:'Black' },
    fr: { white:'Blanche', orange:'Orange', blue:'Bleue 8', yellow:'Bleue 7★', green:'Jaune 6',
          brown:'Jaune 5★', brown1:'Verte 4', black:'Verte 3★', brown2kyu:'Marron 2', brown1kyu:'Marron 1', shodan:'Noire' }
  };
  document.querySelectorAll('.belt-tab').forEach(btn => {
    const id = btn.dataset.belt;
    if (id === 'katas') {
      btn.innerHTML = `<span class="kata-tab-icon">型</span>${UI[l].kataTab}`;
      return;
    }
    const belt = belts.find(b => b.id === id);
    const isUser = id === userBelt;
    const lbl = (tabLabelsLang[l] && tabLabelsLang[l][id]) || belt.name[l].split(' ')[0];
    btn.innerHTML = `<span class="belt-dot"></span>${lbl}${isUser ? ` <span class="you-badge">${UI[l].youLabel}</span>` : ''}`;
  });
  // Re-render current panel
  if (showingKatas) {
    document.getElementById('mainContent').innerHTML = buildKataLibrary();
    updateBeltPosterBtn(activeBelt);
  } else {
    renderPanel(activeBelt);
  }
  // Rebuild progress with current belt
  const pc = document.getElementById('progressPath');
  pc.innerHTML = '';
  buildProgressPathDynamic();
  updateMyBeltButton();
  if (glossaryActiveRomaji) openGlossaryDetail(glossaryActiveRomaji);
  else buildGlossaryList();
}

const _GKEYS = Object.keys(GLOSSARY).sort((a, b) => b.length - a.length);

function addTooltips(text) {
  let segs = [{t: text, done: false}];
  for (const key of _GKEYS) {
    const esc = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const rx  = new RegExp('\\b' + esc + '\\b', 'gi');
    const tip = GLOSSARY[key].replace(/"/g, '&quot;');
    const next = [];
    for (const seg of segs) {
      if (seg.done) { next.push(seg); continue; }
      const parts = seg.t.split(rx);
      const hits  = seg.t.match(rx);
      if (!hits) { next.push(seg); continue; }
      for (let i = 0; i < parts.length; i++) {
        if (parts[i]) next.push({t: parts[i], done: false});
        if (i < hits.length)
          next.push({t: `<span class="jp-tip" data-tip="${tip}">${hits[i]}</span>`, done: true});
      }
    }
    segs = next;
  }
  return segs.map(s => s.t).join('');
}

function parseExamLabel(s) {
  const sep = ' — ';
  const idx = s.lastIndexOf(sep);
  return idx === -1
    ? { label: null, content: s }
    : { label: s.slice(0, idx), content: s.slice(idx + sep.length) };
}

function buildExamGroups(requirements) {
  const groups = [];
  for (const r of requirements) {
    const { label, content } = parseExamLabel(r);
    const last = groups[groups.length - 1];
    if (label && last && last.label === label) {
      last.items.push(content);
    } else {
      groups.push({ label, items: [content] });
    }
  }
  return groups.map(g => {
    const bullets = g.items
      .flatMap(item => item.split(' · ').map(s => s.trim()).filter(Boolean));
    const cls = bullets.length === 1 ? ' single' : '';
    return `<div class="exam-group">
      ${g.label ? `<div class="exam-group-label">${g.label}</div>` : ''}
      <ul class="exam-list${cls}">${bullets.map(b => `<li><span class="exam-text">${addTooltips(b)}</span></li>`).join('')}</ul>
    </div>`;
  }).join('');
}

        <div class="technique-romaji">${t.romaji}</div>

  const romajiMap = new Map(glossaryTerms.map(t => [t.romaji.toLowerCase(), t.romaji]));
  document.querySelectorAll('.exam-reqs .jp-tip').forEach(span => {
    const key = span.textContent.trim().toLowerCase();
    if (romajiMap.has(key)) span.dataset.romaji = romajiMap.get(key);

function updateBeltPosterBtn(beltId) {
  const btn = document.getElementById('btnBeltPoster');
  if (!btn) return;
  const src = BELT_POSTERS[beltId];
  if (src) {
    const belt = belts.find(b => b.id === beltId);
    btn.textContent = `${UI[lang].posterBelt} — ${belt.name[lang]}`;
    btn.onclick = () => openPoster(src, belt.name[lang]);
    btn.style.display = '';
  } else {
    btn.style.display = 'none';
  }
}

function renderPanel(id) {
  document.getElementById('mainContent').innerHTML = buildPanel(belts.find(b=>b.id===id));
  markGlossaryLinks();
  updateBeltPosterBtn(id);
}

function switchBelt(id) {
  showingKatas = false;
  activeBelt = id;
  document.querySelectorAll('.belt-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.belt-tab[data-belt="${id}"]`).classList.add('active');
  document.querySelectorAll('.sidebar-belt').forEach(t=>t.classList.remove('active'));
  const sb = document.querySelector(`.sidebar-belt[data-belt="${id}"]`);
  if (sb) sb.classList.add('active');
  renderPanel(id);
  window.scrollTo({top:0, behavior:'smooth'});

function openPosterModal(label) {
  const modal = document.getElementById('posterModal');
  const img   = document.getElementById('modalPoster');
  const lbl   = document.getElementById('modalLabel');
  if (!img.src || img.src === window.location.href) img.src = POSTER_FULL_URI;

}

function closePosterModal() {
  document.getElementById('posterModal').classList.remove('open');

}

}

});


// ── BELT PICKER ──────────────────────────────────────────────────────
let userBeltMutable = localStorage.getItem('kyokushin-my-belt') || 'orange';

const tabLabelsForPicker = {
  en: { white:'White Belt', orange:'Orange Belt', blue:'Blue Belt',
        yellow:'Blue Stripe Belt', green:'Yellow Belt', brown:'Yellow Stripe Belt',
        brown1:'Green Belt', black:'Green Stripe Belt',
        brown2kyu:'Brown Belt', brown1kyu:'Brown Belt 1st Kyu', shodan:'Black Belt — Shodan' },
  fr: { white:'Ceinture Blanche', orange:'Ceinture Orange', blue:'Ceinture Bleue',
        yellow:'Ceinture Bleue Barrette', green:'Ceinture Jaune', brown:'Ceinture Jaune Barrette',
        brown1:'Ceinture Verte', black:'Ceinture Verte Barrette',
        brown2kyu:'Ceinture Marron', brown1kyu:'Ceinture Marron 1er Kyu', shodan:'Ceinture Noire — Shodan' }
};

function getMyBelt() { return userBeltMutable; }

function updateMyBeltButton() {
  const belt = belts.find(b => b.id === userBeltMutable);
  if (!belt) return;
  const swatch = document.getElementById('myBeltSwatch');
  const label  = document.getElementById('myBeltLabel');
  if (swatch) swatch.style.cssText = `background:${belt.color};border-color:${belt.color};width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.2)`;
  if (label)  label.textContent = (tabLabelsForPicker[lang] && tabLabelsForPicker[lang][userBeltMutable]) || belt.name[lang];
}

function buildPickerList() {
  const list = document.getElementById('pickerList');
  if (!list) return;
  list.innerHTML = '';
  beltOrder.forEach(id => {
    const belt = belts.find(b => b.id === id);
    const isSelected = id === userBeltMutable;
    const item = document.createElement('button');
    item.className = `picker-item${isSelected ? ' active' : ''}`;
    item.dataset.belt = id;

    // Two-tone swatch for stripe belts
    const isStripe = ['yellow','brown','black','brown1kyu'].includes(id);
    const swatchStyle = isStripe
      ? `background:linear-gradient(90deg,${belt.color} 65%,#5a3010 65%)`
      : `background:${belt.color}`;

    const displayName = (tabLabelsForPicker[lang] && tabLabelsForPicker[lang][id]) || belt.name[lang];

    item.innerHTML = `
      <div class="picker-swatch" style="${swatchStyle}"></div>
      <div class="picker-info">
        <div class="picker-name">${displayName}</div>
        <div class="picker-kyu">${belt.kyu} · ${belt.nameJP}</div>
      </div>
      <span class="picker-check">✓</span>
    `;
    item.onclick = () => selectMyBelt(id);
    list.appendChild(item);
  });
}

function openBeltPicker() {
  document.getElementById('pickerTitle').textContent =
    lang === 'fr' ? 'Ma ceinture actuelle' : 'My Current Belt';
  buildPickerList();
  document.getElementById('beltPickerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeBeltPicker() {
  document.getElementById('beltPickerModal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeBeltPickerOnBg(e) {
  if (e.target === document.getElementById('beltPickerModal')) closeBeltPicker();
}

function selectMyBelt(id) {
  userBeltMutable = id;
  localStorage.setItem('kyokushin-my-belt', id);

  // Update picker UI
  document.querySelectorAll('.picker-item').forEach(el => {
    el.classList.toggle('active', el.dataset.belt === id);
  });

  // Update header button
  updateMyBeltButton();

  // Update progress path dots (re-render)
  const c = document.getElementById('progressPath');
  c.innerHTML = '';
  buildProgressPathDynamic();

  // Update sidebar opacity
  document.querySelectorAll('.sidebar-belt').forEach((btn, i) => {
    const beltIdx = beltOrder.indexOf(btn.dataset.belt);
    const userIdx = beltOrder.indexOf(userBeltMutable);
    btn.style.opacity = beltIdx <= userIdx ? '1' : '0.4';
  });

  // YOU badge on tabs
  document.querySelectorAll('.belt-tab .you-badge').forEach(b => b.remove());
  const activeTab = document.querySelector(`.belt-tab[data-belt="${id}"]`);
  if (activeTab) {
    const badge = document.createElement('span');
    badge.className = 'you-badge';
    badge.textContent = UI[lang].youLabel;
    activeTab.appendChild(badge);
  }

  // Close after short delay for satisfying feedback
  setTimeout(closeBeltPicker, 280);
}

// Separate progress path builder that uses userBeltMutable
function buildProgressPathDynamic() {
  const c = document.getElementById('progressPath');
  const userIdx = beltOrder.indexOf(userBeltMutable);
  const kyuLabels = {
    white:'10', orange:'9-8', blue:'8', yellow:'7', green:'6',
    brown:'5', brown1:'4', black:'3', brown2kyu:'2', brown1kyu:'1', shodan:'Dan'
  };
  beltOrder.forEach((id, i) => {
    const belt = belts.find(b => b.id === id);
    const status = i < userIdx ? 'achieved' : i === userIdx ? 'current' : 'future';
    const node = document.createElement('div');
    node.className = `progress-node ${status}`;
    node.innerHTML = `<div class="progress-dot" style="background:${belt.color};border-color:${belt.color}"></div>
      <span class="progress-label">${kyuLabels[id] || id.slice(0,2)}</span>`;
    node.onclick = () => switchBelt(id);
    c.appendChild(node);
    if (i < beltOrder.length - 1) {
      const line = document.createElement('div'); line.className = 'progress-line'; c.appendChild(line);
    }
  });
}

// GLOSSARY PANEL
// ════════════════════════════════════════════════
function jsString(value) {
  return String(value).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

const glossaryTerms = (() => {
  const seen = new Set();
  const list = [];
  for (const belt of belts) {
    for (const t of belt.techniques) {
      if (!seen.has(t.romaji)) { seen.add(t.romaji); list.push(t); }
    }
  }
  return list.sort((a,b) => a.romaji.localeCompare(b.romaji));
})();

const CATEGORY_DEFS = [
  { tag:'kihon',      color:'#f08878', jp:'基本', label:{ en:'Kihon — Basic Techniques', fr:'Kihon — Techniques de base' } },
  { tag:'kata',       color:'#78a8f0', jp:'型',   label:{ en:'Kata — Forms',             fr:'Kata — Formes'              } },
  { tag:'kumite',     color:'#72d080', jp:'組手', label:{ en:'Kumite — Sparring',        fr:'Kumite — Combat'            } },
  { tag:'kihon-waza', color:'#e0a860', jp:'技',   label:{ en:'Waza — Special',           fr:'Waza — Spécial'            } },
];
const TAG_COLORS = Object.fromEntries(CATEGORY_DEFS.map(c => [c.tag, c.color]));

let glossaryFilter = '';
let glossaryActiveRomaji = null;

function openGlossaryPanel() {
  if (window.innerWidth >= 1280) return;
  document.getElementById('glossaryPanel').classList.add('open');
  document.getElementById('glossaryBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeGlossaryPanel() {
  document.getElementById('glossaryPanel').classList.remove('open');
  document.getElementById('glossaryBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function _glossaryItemHtml(t) {
  return `<div class="glossary-item${glossaryActiveRomaji === t.romaji ? ' g-active' : ''}"
       onclick="openGlossaryDetail('${jsString(t.romaji)}')">
    <div class="glossary-item-dot" style="background:${TAG_COLORS[t.tag] || '#888'}"></div>
    <div class="glossary-item-text">
      <div class="glossary-item-romaji">${t.romaji}</div>
      <div class="glossary-item-jp">${t.japanese}</div>
    </div>
  </div>`;
}

function buildGlossaryList() {
  const container = document.getElementById('glossaryList');
  if (!container) return;
  const q = glossaryFilter.toLowerCase();
  const L = lang;
  const filtered = q
    ? glossaryTerms.filter(t =>
        (t.romaji||'').toLowerCase().includes(q) ||
        (t.japanese||'').includes(q) ||
        (t.english||'').toLowerCase().includes(q) ||
        (t.french||'').toLowerCase().includes(q))
    : glossaryTerms;
  if (!filtered.length) {
    container.innerHTML = `<p style="padding:20px 14px;color:var(--text-sub);font-size:12px;text-align:center">No terms found</p>`;
    return;
  }
  if (q) { container.innerHTML = filtered.map(_glossaryItemHtml).join(''); return; }
  let html = ''; let first = true;
  for (const cat of CATEGORY_DEFS) {
    const items = filtered.filter(t => t.tag === cat.tag);
    if (!items.length) continue;
    html += `<div class="glossary-cat-header${first ? ' g-first' : ''}">
      <div class="glossary-cat-pip" style="background:${cat.color}"></div>
      <span class="glossary-cat-name">${cat.jp} ${cat.label[L]||cat.label.en}</span>
      <span class="glossary-cat-count">${items.length}</span>
    </div>${items.map(_glossaryItemHtml).join('')}`;
    first = false;
  }
  container.innerHTML = html;
}

function filterGlossary(val) {
  glossaryFilter = val;
  buildGlossaryList();
}

function openGlossaryDetail(romaji) {
  const t = glossaryTerms.find(x => x.romaji === romaji);
  if (!t) return;
  glossaryActiveRomaji = romaji;
  const L = lang;
  const displayName = L === 'fr' ? t.french : t.english;
  const figHtml = (typeof getPosterFig !== 'undefined' && t.posterKey)
    ? getPosterFig(t.posterKey)
    : `<div class="glossary-no-img">${t.japanese}</div>`;
  const detail = document.getElementById('glossaryDetail');
  const listView = document.getElementById('glossaryListView');
  detail.innerHTML = `
    <button class="glossary-detail-back" onclick="closeGlossaryDetail()">← All techniques</button>
    <div class="glossary-detail-scroll">
      ${figHtml}
      <div class="glossary-detail-body">
        <div class="glossary-detail-jp">${t.japanese}</div>
        <div class="glossary-detail-romaji">${t.romaji}</div>
        <div class="glossary-detail-en">${displayName}</div>
        <p class="glossary-detail-desc">${t.desc[L]}</p>
        <div class="glossary-detail-footer">
          <span class="technique-tag tag-${t.tag}">${t.tag.replace('-',' ')}</span>
          <a href="${t.video}" target="_blank" class="glossary-detail-video">▶ YouTube</a>
        </div>
      </div>
    </div>`;
  listView.classList.add('g-hidden');
  detail.classList.add('g-active');
  buildGlossaryList();
}

function closeGlossaryDetail() {
  glossaryActiveRomaji = null;
  document.getElementById('glossaryDetail').classList.remove('g-active');
  document.getElementById('glossaryListView').classList.remove('g-hidden');
  buildGlossaryList();
}

document.addEventListener('click', function(e) {
  if (e.target.closest('.jp-tip')) return;
  document.querySelectorAll('.jp-tip.tip-open').forEach(el => el.classList.remove('tip-open'));
});

// ── INIT ──
// Apply saved language to button state
document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
document.querySelector(`.lang-btn[data-lang="${lang === 'en' ? 'fr' : 'en'}"]`).classList.remove('active');
if (lang === 'fr') {
  document.getElementById('mainTitle').textContent = UI.fr.title;
  document.getElementById('subtitleText').textContent = UI.fr.subtitle;
}
// Override with saved belt
userBeltMutable = localStorage.getItem('kyokushin-my-belt') || 'orange';
buildProgressPathDynamic();
buildBeltNav();
buildSidebar();
updateMyBeltButton();
switchBelt(userBeltMutable);
buildGlossaryList();
</script>
